name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -count=1 ./...
      - name: make build
        run: make build

  python-sdk:
    name: Python SDK (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install SDK + dev deps + build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] build twine
      - name: Verify daimon/_version.py matches pyproject.toml
        # Mirror of the TS gen-version step. The script is idempotent;
        # if the committed _version.py is already in sync, the diff is
        # empty. Catches the case where someone bumps the version in
        # pyproject.toml without re-running scripts/gen_version.py.
        run: |
          python scripts/gen_version.py
          git diff --exit-code daimon/_version.py || {
            echo "::error::daimon/_version.py is out of sync with pyproject.toml. Run python scripts/gen_version.py and commit the result.";
            exit 1;
          }
      - name: pytest
        run: pytest -q
      - name: Build wheel + sdist
        run: python -m build
      - name: twine check
        run: python -m twine check dist/*

  typescript-sdk:
    name: TypeScript SDK (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm test
      - name: build
        run: npm run build
      - name: npm pack --dry-run
        run: npm pack --dry-run

  x402-smoke:
    name: x402 cross-language live smoke
    runs-on: ubuntu-latest
    # Runs the same examples/x402-smoke/run.sh a developer would invoke
    # locally: builds binaries + both SDKs, init/unlock a fresh daimon,
    # creates an evm:base wallet, spins up the x402-mock-server, runs
    # python_smoke.py + typescript_smoke.mjs, asserts the audit log has
    # 2 payment.signed + 2 payment.settled rows attributing to the
    # wallet. The mock server cryptographically verifies the
    # PAYMENT-SIGNATURE on each retry, so any future drift between the
    # Python and TypeScript EIP-3009 encoders trips this job
    # immediately.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Run cross-language smoke
        run: bash examples/x402-smoke/run.sh
        env:
          # CI runners are loaded; a higher port avoids conflict with
          # any unrelated services bound to the typical 8xxx range.
          PORT: 18402

  v04-cross-daimon-smoke:
    name: v0.4 cross-daimon capability + reputation smoke
    # Runs ONLY the TestV04CrossDaimonSmoke_EndToEnd integration test in
    # verbose mode. The same test also runs as part of the main Go shard
    # (it lives in internal/server, not behind a build tag) — this shard
    # exists for visibility: its green badge means
    # "cross-daimon capability delegation + reputation receipts work
    # end-to-end over a real encrypted Noise IK channel".
    #
    # Why this matters as a separate shard:
    #   1. Verbose output is preserved in the workflow log so a failure
    #      is immediately legible (the main Go shard runs ALL tests and
    #      a failure here would be buried in the firehose).
    #   2. Independent timing — if cross-daimon scenarios slow down,
    #      we see it here without it being masked by faster unit tests.
    #   3. Future v0.4 narrative tests (e.g. cross-daimon receipt-as-
    #      input for further peer.ask, multi-hop attenuation) land in
    #      the same file and get the same visibility.
    #
    # This shard validates §17 GA criteria #2 (cross-daimon smoke in CI)
    # for v0.4 — the analogue of TestFederationSmoke_EndToEnd for v0.3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run v0.4 cross-daimon smoke (verbose)
        run: |
          go test -race -count=1 -v \
            -run '^TestV04CrossDaimonSmoke_EndToEnd$' \
            ./internal/server/

  install-script:
    name: install.sh — end-to-end against published release
    # The repo's `curl | sh` install path is a public-facing contract.
    # This shard runs the CURRENT install.sh from the checkout against
    # whatever's published as the latest release, then runs the
    # installed binaries to confirm they work. Catches three regression
    # classes:
    #   1. install.sh syntax errors / portability bugs
    #   2. GitHub API tag-resolution drift (e.g. response shape changes)
    #   3. Broken artifacts in the published release (corrupt tarball,
    #      wrong checksum, binary fails to execute)
    # We test both ubuntu-latest (linux-amd64) and macos-latest (currently
    # darwin-arm64) so the macOS-specific shasum codepath gets exercised
    # alongside the Linux sha256sum one.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Run install.sh into a tempdir
        env:
          # Authenticated GitHub API calls have 5000 req/hour; unauthenticated
          # is 60/hour per IP, and shared CI infrastructure hits that limit
          # under load. install.sh respects GH_TOKEN / GITHUB_TOKEN — passing
          # the runner's built-in token lets us avoid rate-limit-driven
          # false-failures on this shard. The token has read-only public-repo
          # scope which is exactly what the /releases endpoint needs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMP=$(mktemp -d 2>/dev/null || mktemp -d -t daimon-install-ci)
          echo "::group::install.sh output"
          DAIMON_INSTALL_PREFIX="$TMP" sh ./install.sh
          echo "::endgroup::"
          # The script's own end-of-output already prints the version,
          # but assert structurally here so a future cosmetic change to
          # the script doesn't accidentally silence the CI check.
          version=$("$TMP/daimon" --help 2>&1 | head -1)
          echo "daimon --help: $version"
          echo "$version" | grep -E '^daimon v[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "::error::daimon --help did not report a v-prefixed version"; exit 1; }
          # Confirm daimond launches its usage rather than segfaulting.
          # We don't actually run `daimond serve` — that would need a
          # full $DAIMON_HOME setup; the --help path proves the binary
          # is executable and the version-injection ldflag landed.
          # daimond writes usage to STDERR (cmd/daimond/main.go's
          # usage() uses fmt.Fprintf(os.Stderr, ...)) so we redirect
          # stderr to stdout before grepping.
          "$TMP/daimond" --help 2>&1 | head -1 \
            | grep -E '^daimond v[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "::error::daimond --help did not report a v-prefixed version"; exit 1; }
