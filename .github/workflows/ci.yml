name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (daemon + CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -count=1 ./...
      - name: make build
        run: make build

  python-sdk:
    name: Python SDK (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install SDK + dev deps + build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] build twine
      - name: Verify daimon/_version.py matches pyproject.toml
        # Mirror of the TS gen-version step. The script is idempotent;
        # if the committed _version.py is already in sync, the diff is
        # empty. Catches the case where someone bumps the version in
        # pyproject.toml without re-running scripts/gen_version.py.
        run: |
          python scripts/gen_version.py
          git diff --exit-code daimon/_version.py || {
            echo "::error::daimon/_version.py is out of sync with pyproject.toml. Run python scripts/gen_version.py and commit the result.";
            exit 1;
          }
      - name: pytest
        run: pytest -q
      - name: Build wheel + sdist
        run: python -m build
      - name: twine check
        run: python -m twine check dist/*

  typescript-sdk:
    name: TypeScript SDK (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm test
      - name: build
        run: npm run build
      - name: npm pack --dry-run
        run: npm pack --dry-run

  x402-smoke:
    name: x402 cross-language live smoke
    runs-on: ubuntu-latest
    # Runs the same examples/x402-smoke/run.sh a developer would invoke
    # locally: builds binaries + both SDKs, init/unlock a fresh daimon,
    # creates an evm:base wallet, spins up the x402-mock-server, runs
    # python_smoke.py + typescript_smoke.mjs, asserts the audit log has
    # 2 payment.signed + 2 payment.settled rows attributing to the
    # wallet. The mock server cryptographically verifies the
    # PAYMENT-SIGNATURE on each retry, so any future drift between the
    # Python and TypeScript EIP-3009 encoders trips this job
    # immediately.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Run cross-language smoke
        run: bash examples/x402-smoke/run.sh
        env:
          # CI runners are loaded; a higher port avoids conflict with
          # any unrelated services bound to the typical 8xxx range.
          PORT: 18402
